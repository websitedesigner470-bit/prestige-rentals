<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Clock</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0f0f1a, #000);
    font-family: Arial, sans-serif;
    color: white;
}

/* CLOCK CONTAINER */
.clock-container {
    text-align: center;
    animation: fadeIn 2s ease-in;
}

/* DIGITAL CLOCK */
#digital {
    font-size: 60px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

/* ANALOG CLOCK */
.clock {
    width: 220px;
    height: 220px;
    border: 6px solid gold;
    border-radius: 50%;
    position: relative;
    margin: auto;
    box-shadow: 0 0 25px gold;
}

/* HANDS */
.hand {
    position: absolute;
    background: white;
    transform-origin: bottom;
    bottom: 50%;
    left: 50%;
    transform: translateX(-50%);
}

.hour {
    width: 6px;
    height: 60px;
    background: #ffcc00;
}

.minute {
    width: 4px;
    height: 80px;
}

.second {
    width: 2px;
    height: 90px;
    background: red;
}

/* CENTER DOT */
.center {
    width: 12px;
    height: 12px;
    background: gold;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<div class="clock-container">

    <div id="digital">00:00:00</div>

    <div class="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
        <div class="center"></div>
    </div>

</div>

<script>
function updateClock() {
    const now = new Date();

    let h = now.getHours();
    let m = now.getMinutes();
    let s = now.getSeconds();

    // DIGITAL CLOCK
    document.getElementById("digital").innerText =
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    // ANALOG CLOCK
    let hDeg = (h % 12) * 30 + m * 0.5;
    let mDeg = m * 6;
    let sDeg = s * 6;

    document.getElementById("hour").style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
    document.getElementById("minute").style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
    document.getElementById("second").style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
